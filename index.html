<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToolKitText – Free Online Text Utility</title>
  <meta name="description" content="Free all-in-one text utility tool. Count words and characters, convert case, and clean text formatting instantly in your browser. No sign-up required." />
  
  <meta name="title" content="ToolKitText – Free Online Text Utility" />
  
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://toolkittext.com/" />
  <meta property="og:title" content="ToolKitText – Free Online Text Utility" />
  <meta property="og:description" content="Free all-in-one text utility tool. Count words and characters, convert case, and clean text formatting instantly in your browser. No sign-up required." />
  <meta property="og:image" content="https://toolkittext.com/favicon.png" />

  <meta property="twitter:card" content="summary" />
  <meta property="twitter:url" content="https://toolkittext.com/" />
  <meta property="twitter:title" content="ToolKitText – Free Online Text Utility" />
  <meta property="twitter:description" content="Free all-in-one text utility tool. Count words and characters, convert case, and clean text formatting instantly in your browser. No sign-up required." />
  <meta property="twitter:image" content="https://toolkittext.com/favicon.png" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="shortcut icon" type="image/png" href="favicon.png" />
  <link rel="apple-touch-icon" href="favicon.png" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f7f5;
      --surface: #ffffff;
      --surface2: #f0efec;
      --border: #e2e0da;
      --text: #1a1917;
      --text-muted: #6b6860;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --accent-muted: #eff6ff;
      --green: #16a34a;
      --green-bg: #f0fdf4;
      --danger: #dc2626;
      --stat-bg: #ffffff;
      --shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.12), 0 10px 20px -10px rgba(0, 0, 0, 0.08), 0 0 1px 0 rgba(0, 0, 0, 0.25);
      --radius: 10px;
      --font: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
      --transition: .2s ease;
      --textarea-bg: #ffffff;
    }

    [data-theme="dark"] {
      --bg: #111110;
      --surface: #1c1b1a;
      --surface2: #242322;
      --border: #2e2d2b;
      --text: #f0ede8;
      --text-muted: #8a8780;
      --accent: #3b82f6;
      --accent-hover: #60a5fa;
      --accent-muted: #1e3a5f;
      --green: #4ade80;
      --green-bg: #052e16;
      --stat-bg: #1c1b1a;
      --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), 0 12px 24px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.04);
      --textarea-bg: #151413;
    }

    html { scroll-behavior: smooth; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.6; transition: background var(--transition), color var(--transition); min-height: 100vh; }
    
    /* ... Din eksisterende CSS ... */
    body.is-legal .tool-section, body.is-legal .bottom-content { display: none; }
    body.is-legal .legal-full-content { display: block; max-width: 800px; margin: 40px auto; padding: 0 24px; text-align: center; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 60px 24px 40px 24px; display: flex; flex-direction: column; align-items: center; text-align: center; position: relative; }
    .logo { font-size: clamp(42px, 8vw, 68px); font-weight: 800; color: var(--text); text-decoration: none; margin-bottom: 25px; }
    .logo span { color: var(--accent); }
    nav { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: center; }
    nav a { font-size: 13px; font-weight: 600; color: var(--text-muted); text-decoration: none; padding: 8px 16px; border-radius: 30px; background: var(--surface2); border: 1px solid var(--border); }
    nav a:hover, nav a.active { color: #fff; background: var(--accent); border-color: var(--accent); }
    .dark-toggle { position: absolute; top: 20px; right: 24px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 12px; font-weight: 600; padding: 6px 14px; border-radius: 6px; cursor: pointer; }
    .page-wrap { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
    .tool-header { margin-bottom: 28px; text-align: center; }
    .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 24px; margin-bottom: 24px; padding: 0 25px; }
    .stat-card { background: var(--stat-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; text-align: center; }
    .workspace { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); display: flex; flex-direction: column; }
    textarea { width: 100%; min-height: 340px; padding: 25px; font-family: var(--font); font-size: 16px; background: var(--textarea-bg); border: none; border-bottom: 1px solid var(--border); outline: none; }
    .toolbar { padding: 16px 25px; display: flex; flex-wrap: wrap; gap: 7px; align-items: center; background: var(--surface2); }
    .toolbar-sep { width: 1px; height: 22px; background: var(--border); }
    .toolbar-right { margin-left: auto; display: flex; gap: 8px; }
    .btn { font-family: var(--font); font-size: 12.5px; font-weight: 500; padding: 6px 13px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; }
    .btn-undo { font-family: var(--font); font-size: 12.5px; font-weight: 600; padding: 6px 14px; border-radius: 6px; border: 1px solid var(--text-muted); background: var(--surface); cursor: pointer; }
    .btn-clear { color: var(--danger); }
    .btn-copy { font-weight: 600; padding: 7px 18px; border: none; background: var(--surface2); color: var(--text-muted); }
    .btn-copy.has-text { background: var(--accent); color: #fff; }

    /* Nye elementer */
    .privacy-badge { font-size: 0.8rem; color: var(--text-muted); text-align: center; padding: 10px; }
    #codeOutput { display: block; padding: 20px; background: var(--textarea-bg); border: 1px solid var(--border); border-radius: var(--radius); margin: 20px; overflow-x: auto; font-family: var(--mono); }

    .dialog-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex; align-items: center; justify-content: center; z-index: 200; opacity: 0; pointer-events: none; }
    .dialog-overlay.visible { opacity: 1; pointer-events: all; }
    .dialog { background: var(--surface); border-radius: 14px; padding: 32px; max-width: 380px; text-align: center; }
    footer { text-align: center; padding: 24px; border-top: 1px solid var(--border); margin-top: 60px; color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="dialog-overlay" id="clearDialog">
    <div class="dialog">
      <h3>Clear all text?</h3>
      <p>This will permanently remove everything in the editor.</p>
      <div style="display:flex; gap:12px; justify-content:center;">
        <button class="btn" onclick="closeDialog()">Cancel</button>
        <button class="btn" style="background:var(--danger); color:white;" onclick="confirmClear()">Yes</button>
      </div>
    </div>
  </div>

  <header>
    <button class="dark-toggle" id="darkToggle" onclick="toggleDark()">☀ Light Mode</button>
    <a href="/" class="logo">ToolKit<span>Text</span></a>
    <nav id="mainNav">
        <a href="/word-counter">Word Counter</a>
        <a href="/character-counter">Char Counter</a>
        <a href="/case-converter">Case Converter</a>
        <a href="/remove-line-breaks">Line Breaks</a>
        <a href="/clean-text">Clean Text</a>
    </nav>
  </header>

  <div class="page-wrap">
    <div class="tool-header">
      <h1 id="pageTitle">Copy/paste broke your text?</h1>
      <p id="pageDesc">The all-in-one text utility</p>
    </div>

    <div class="main-grid">
      <div class="workspace">
        <textarea id="mainTextarea" oninput="handleInput()"></textarea>
        <div class="toolbar">
           <button class="btn" onclick="applyTransform('uppercase')">UPPERCASE</button>
           <button class="btn" onclick="applyTransform('lowercase')">lowercase</button>
           <button class="btn" onclick="beautifyCode()">Beautify Code</button>
           <div class="toolbar-right">
             <button class="btn-undo" id="undoBtn" onclick="undo()" disabled>↩ Undo</button>
             <button class="btn-clear" onclick="requestClear()">Clear</button>
             <button class="btn-copy" id="copyBtn" onclick="copyText()">Copy Text</button>
           </div>
        </div>
      </div>
    </div>

    <div class="privacy-badge">🔒 100% client-side. Nothing is ever sent to a server.</div>
    <pre><code id="codeOutput"></code></pre>
  </div>

  <script>
    // Din originale JS logik...
    // Tilføj denne funktion til din script-sektion:
    function beautifyCode() {
      const output = document.getElementById('codeOutput');
      output.textContent = document.getElementById('mainTextarea').value;
      hljs.highlightElement(output);
    }

    // [Indsæt resten af din originale JS herfra...]
  </script>
</body>
</html>
