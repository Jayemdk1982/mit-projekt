<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToolKitText – Free Online Text Utility</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f7f7f5; --surface: #ffffff; --surface2: #f0efec; --border: #e2e0da;
      --text: #1a1917; --text-muted: #6b6860; --accent: #2563eb; --danger: #dc2626;
      --radius: 10px; --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace;
    }
    [data-theme="dark"] {
      --bg: #111110; --surface: #1c1b1a; --surface2: #242322; --border: #2e2d2b;
      --text: #f0ede8; --text-muted: #8a8780; --accent: #3b82f6;
    }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
    .workspace { max-width: 900px; margin: 0 auto; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    textarea { width: 100%; min-height: 300px; padding: 20px; border: none; border-bottom: 1px solid var(--border); outline: none; resize: vertical; font-family: var(--font); font-size: 16px; background: transparent; color: var(--text); }
    
    .toolbar { padding: 12px; display: flex; flex-wrap: wrap; gap: 6px; background: var(--surface2); border-bottom: 1px solid var(--border); }
    .action-bar { padding: 12px 20px; display: flex; gap: 10px; align-items: center; background: var(--surface); }
    
    .btn { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: 12px; font-weight: 500; }
    .btn-undo { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--text-muted); background: var(--surface); cursor: pointer; font-size: 12px; font-weight: 600; }
    .btn-clear { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); color: var(--danger); cursor: pointer; font-size: 12px; font-weight: 500; }
    .btn-copy { padding: 6px 20px; border-radius: 6px; border: none; background: var(--accent); color: white; cursor: pointer; font-weight: 600; font-size: 13px; }
    
    @media (max-width: 600px) {
      .toolbar { gap: 4px; }
      .btn { font-size: 11px; padding: 5px 10px; }
    }
  </style>
</head>
<body>

  <div class="workspace">
    <div class="toolbar">
      <button class="btn" onclick="applyTransform('uppercase')">UPPERCASE</button>
      <button class="btn" onclick="applyTransform('lowercase')">lowercase</button>
      <button class="btn" onclick="applyTransform('titlecase')">Title Case</button>
      <button class="btn" onclick="applyTransform('sentencecase')">Sentence case</button>
      <button class="btn" onclick="applyTransform('cleanspaces')">Clean Spaces</button>
      <button class="btn" onclick="applyTransform('cleanpdftext')">Fix PDF</button>
      <button class="btn" onclick="applyTransform('stripmarkdown')">Strip AI Formatting</button>
      <button class="btn" onclick="applyTransform('removelinebreaks')">Merge Into 1 Line</button>
    </div>
    
    <textarea id="mainTextarea" placeholder="Start typing or paste your text here..."></textarea>
    
    <div class="action-bar">
      <button class="btn-undo" id="undoBtn" onclick="undo()" disabled>↩ Undo</button>
      <div style="flex-grow: 1;"></div>
      <button class="btn-clear" onclick="confirmClear()">Clear</button>
      <button class="btn-copy" id="copyBtn" onclick="copyText()">Copy Text</button>
    </div>
  </div>

  <script>
    const ta = document.getElementById('mainTextarea');
    let undoStack = [''];

    function applyTransform(type) {
      let txt = ta.value;
      if (type === 'uppercase') txt = txt.toUpperCase();
      if (type === 'lowercase') txt = txt.toLowerCase();
      if (type === 'stripmarkdown') txt = txt.replace(/\*\*(.*?)\*\*/g, '$1').replace(/#{1,6}\s+/g, '').replace(/[\*•]/g, '').trim();
      // Tilføj dine øvrige logikker her...
      
      ta.value = txt;
      saveToUndo();
    }

    function saveToUndo() {
      undoStack.push(ta.value);
      document.getElementById('undoBtn').disabled = false;
    }

    function undo() {
      if (undoStack.length > 1) {
        undoStack.pop();
        ta.value = undoStack[undoStack.length - 1];
        if (undoStack.length === 1) document.getElementById('undoBtn').disabled = true;
      }
    }

    function confirmClear() {
      if(confirm('Clear all text?')) { ta.value = ''; saveToUndo(); }
    }

    function copyText() {
      navigator.clipboard.writeText(ta.value);
      alert('Copied to clipboard!');
    }
  </script>
</body>
</html>
