<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ToolKitText – Free Online Text Utility</title>
  <meta name="description" content="Free all-in-one text utility tool. Count words and characters, convert case, and clean text formatting instantly in your browser. No sign-up required." />
  
  <meta name="title" content="ToolKitText – Free Online Text Utility" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://toolkittext.com/" />
  <meta property="og:title" content="ToolKitText – Free Online Text Utility" />
  <meta property="og:description" content="Free all-in-one text utility tool. Count words and characters, convert case, and clean text formatting instantly in your browser. No sign-up required." />
  <meta property="og:image" content="https://toolkittext.com/favicon.png" />

  <meta property="twitter:card" content="summary" />
  <meta property="twitter:url" content="https://toolkittext.com/" />
  <meta property="twitter:title" content="ToolKitText – Free Online Text Utility" />
  <meta property="twitter:description" content="Free all-in-one text utility tool. Count words and characters, convert case, and clean text formatting instantly in your browser. No sign-up required." />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <style>
    /* Din eksisterende CSS */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #f7f7f5; --surface: #ffffff; --surface2: #f0efec; --border: #e2e0da; --text: #1a1917; --text-muted: #6b6860; --accent: #2563eb; --accent-hover: #1d4ed8; --accent-muted: #eff6ff; --green: #16a34a; --green-bg: #f0fdf4; --stat-bg: #ffffff; --shadow: 0 15px 35px -5px rgba(0, 0, 0, 0.12), 0 10px 20px -10px rgba(0, 0, 0, 0.08), 0 0 1px 0 rgba(0, 0, 0, 0.25); --radius: 10px; --font: 'DM Sans', sans-serif; --mono: 'DM Mono', monospace; --transition: .2s ease; --textarea-bg: #ffffff; }
    [data-theme="dark"] { --bg: #111110; --surface: #1c1b1a; --surface2: #242322; --border: #2e2d2b; --text: #f0ede8; --text-muted: #8a8780; --accent: #3b82f6; --accent-hover: #60a5fa; --accent-muted: #1e3a5f; --green: #4ade80; --green-bg: #052e16; --stat-bg: #1c1b1a; --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), 0 12px 24px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.04); --textarea-bg: #151413; }
    body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }
    textarea { width: 100%; min-height: 340px; padding: 25px; background: var(--textarea-bg); color: var(--text); border: none; outline: none; font-family: var(--mono); font-size: 14px; resize: vertical; }
    .toolbar { padding: 16px 25px; display: flex; flex-wrap: wrap; gap: 7px; background: var(--surface2); align-items: center; }
    .btn { padding: 8px 16px; border-radius: var(--radius); border: none; background: var(--accent); color: white; cursor: pointer; font-weight: 500; font-size: 13px; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .privacy-badge { font-size: 0.8rem; color: var(--text-muted); text-align: center; padding: 10px; }
    pre { padding: 20px; background: var(--textarea-bg); border: 1px solid var(--border); border-radius: var(--radius); margin: 20px; overflow-x: auto; }
  </style>
</head>
<body>

  <header><h1>ToolKitText</h1></header>

  <textarea id="mainTextarea" oninput="handleInput()" placeholder="Paste your code or text here..."></textarea>
  
  <div class="toolbar">
    <button class="btn" onclick="applyTransform('uppercase')">UPPERCASE</button>
    <button class="btn" onclick="applyTransform('lowercase')">lowercase</button>
    <button class="btn btn-secondary" onclick="beautifyAndColorize()">Beautify Code</button>
    <button id="undoBtn" class="btn btn-secondary" onclick="undo()" disabled>Undo</button>
  </div>

  <div class="privacy-badge">
    🔒 100% client-side. Nothing is ever sent to a server.
  </div>

  <pre><code id="codeOutput"></code></pre>

  <script>
    const ta = document.getElementById('mainTextarea');
    const SAVE_KEY = 'tkt-text';
    let undoStack = [ta.value];

    function saveToUndo() {
      if (undoStack[undoStack.length - 1] !== ta.value) {
        undoStack.push(ta.value);
      }
      document.getElementById('undoBtn').disabled = undoStack.length <= 1;
    }

    function undo() {
      if (undoStack.length > 1) {
        undoStack.pop();
        ta.value = undoStack[undoStack.length - 1];
      }
      document.getElementById('undoBtn').disabled = undoStack.length <= 1;
    }

    function handleInput() {
      saveToUndo();
      localStorage.setItem(SAVE_KEY, ta.value);
    }

    function applyTransform(type) {
      if (type === 'uppercase') ta.value = ta.value.toUpperCase();
      if (type === 'lowercase') ta.value = ta.value.toLowerCase();
      saveToUndo();
    }

    // NY FUNKTION
    function beautifyAndColorize() {
      const output = document.getElementById('codeOutput');
      output.textContent = ta.value;
      hljs.highlightElement(output);
      saveToUndo();
    }

    window.addEventListener('DOMContentLoaded', () => {
      ta.value = localStorage.getItem(SAVE_KEY) || '';
    });
  </script>
</body>
</html>
